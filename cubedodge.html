<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cube Dodge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🟥 Cube Dodge</h1>
  <canvas id="game" width="400" height="400"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let player = { x: 180, y: 350, w: 40, h: 40, speed: 6 };
    let blocks = [];
    let gameOver = false;
    let score = 0;

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') player.x -= player.speed;
      if (e.key === 'ArrowRight') player.x += player.speed;
    });

    function spawnBlock() {
      blocks.push({ x: Math.random() * 360, y: -20, w: 40, h: 40 });
    }

    function draw() {
      ctx.clearRect(0, 0, 400, 400);
      ctx.fillStyle = '#0bf';
      ctx.fillRect(player.x, player.y, player.w, player.h);

      ctx.fillStyle = '#f22';
      blocks.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

      ctx.fillStyle = '#fff';
      ctx.font = '16px sans-serif';
      ctx.fillText(`Score: ${score}`, 10, 20);
    }

    function update() {
      if (gameOver) return;
      blocks.forEach(b => b.y += 3);
      blocks = blocks.filter(b => b.y < 400);

      blocks.forEach(b => {
        if (b.x < player.x + player.w &&
            b.x + b.w > player.x &&
            b.y < player.y + player.h &&
            b.y + b.h > player.y) {
          gameOver = true;
          alert('💀 Game Over! Score: ' + score);
          location.reload();
        }
      });

      score++;
      if (Math.random() < 0.02) spawnBlock();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
